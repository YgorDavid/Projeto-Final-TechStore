<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore BI | Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #141619;
            /* Fundo ultra-dark alinhado com a loja */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* MENU LATERAL CUSTOMIZADO */
        .sidebar {
            background-color: #1a1d21;
            /* Grafite fosco identitário */
            min-height: 100vh;
            border-right: 1px solid #2b2d33;
            padding: 2rem 1.2rem;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.2);
        }

        .accent-color {
            color: #00d4ff !important;
            /* Ciano Elétrico do seu site */
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .sidebar-title {
            font-size: 1.15rem;
            letter-spacing: 1px;
        }

        /* LINKS DE NAVEGAÇÃO */
        .nav-custom .nav-link {
            color: #a0a5b0 !important;
            font-weight: 500;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            transition: all 0.2s ease-in-out;
            border: 1px solid transparent;
        }

        .nav-custom .nav-link:hover {
            background-color: rgba(0, 212, 255, 0.05);
            color: #00d4ff !important;
            border-color: rgba(0, 212, 255, 0.2);
            padding-left: 20px;
            /* Efeito sutil de deslocamento */
        }

        /* Estado Ativo Dinâmico (Configuração opcional via classe active) */
        .nav-custom .nav-link.active {
            background-color: #00d4ff !important;
            color: #000000 !important;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
        }

        .nav-custom .nav-link.active:hover {
            padding-left: 15px;
            color: #000000 !important;
        }

        /* Linha divisória customizada */
        .divider-custom {
            border-top: 1px solid #2b2d33;
            opacity: 1;
            margin: 1.5rem 0;
        }

        /* BOTÃO VOLTAR */
        .btn-voltar {
            background-color: transparent;
            color: #ff4b4b !important;
            border: 1px solid #ff4b4b;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .btn-voltar:hover {
            background-color: #ff4b4b;
            color: #ffffff !important;
            box-shadow: 0 0 10px rgba(255, 75, 75, 0.4);
        }

        main {
            background-color: #141619;
        }

        .header-dashboard {
            border-bottom: 1px solid #2b2d33;
            padding-bottom: 1.5rem;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar">
                <div class="d-flex align-items-center mb-2">
                    <i class="bi bi-cpu-fill accent-color fs-4 me-2"></i>
                    <h4 class="m-0 fw-bold sidebar-title text-white">TechStore<span
                            class="accent-color">BI</span></h4>
                </div>

                <div class="divider-custom"></div>

                <p class="small text-uppercase fw-bold text-secondary tracking-wider mb-3" style="font-size: 0.75rem;">
                    Módulos Analíticos</p>

                <ul class="nav flex-column nav-custom">
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="{% url 'dashboard_bi' %}">
                            <i class="bi bi-graph-up-arrow me-2 fs-5"></i> Comercial
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="{% url 'dashboard_logistica' %}">
                            <i class="bi bi-box-seam me-2 fs-5"></i> Logística
                        </a>
                    </li>
                </ul>

                <div class="divider-custom"></div>

                <div class="d-grid mt-4">
                    <a href="{% url 'home' %}" class="btn btn-voltar fw-bold py-2">
                        <i class="bi bi-arrow-left-circle me-2"></i> Sair do Painel
                    </a>
                </div>
            </nav>

            <main class="col-md-10 p-5 ms-auto">
                <header class="header-dashboard mb-5 d-flex justify-content-between align-items-end">
                    <div>
                        <h1 class="h2 fw-bold text-white m-0">
                            Tech<span style="color: #00d4ff;">Store</span> | <span class="accent-color">{% block modulo_nome %}BI{% endblock %}</span>
                        </h1>
                        <p class="text-secondary small m-0 mt-1">Dados estruturados e consolidados em tempo real.</p>
                    </div>
                    <div class="text-secondary small">
                        <i class="bi bi-shield-check text-success me-1"></i> Modo Administrador
                    </div>
                </header>

                <div class="animate-fadeIn">
                    {% block content %}
                    {% endblock %}
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
