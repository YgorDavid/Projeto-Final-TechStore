<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore BI | Dashboard</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    
    <style>
        body {
            background-color: #0f111a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .sidebar {
            background-color: #161b22;
            min-height: 100vh;
            border-right: 1px solid #30363d;
            padding: 2rem 1rem;
        }
        .accent-color {
            color: #58a6ff;
            font-weight: bold;
        }
        .nav-link {
            transition: 0.3s;
            border-radius: 8px;
            margin-bottom: 5px;
            color: #fff !important;
        }
        .nav-link:hover {
            background-color: #30363d;
            color: #58a6ff !important;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- MENU LATERAL -->
        <nav class="col-md-2 d-none d-md-block sidebar">
            <h4 class="accent-color">TechStore BI</h4>
            <hr style="border-color: #333;">
            <p class="small text-uppercase text-muted">Módulos</p>
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link p-2" href="{% url 'dashboard_bi' %}">
                        <i class="fas fa-chart-line me-2"></i> Comercial
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link p-2" href="{% url 'dashboard_logistica' %}">
                        <i class="fas fa-box me-2"></i> Logística
                    </a>
                </li>
            </ul>
        </nav>

        <!-- ÁREA DE CONTEÚDO PRINCIPAL -->
        <main class="col-md-10 p-5">
            <header class="mb-5">
                <h1 class="h3">TechStore | <span class="accent-color">{% block modulo_nome %}BI{% endblock %}</span></h1>
                <p class="text-muted small">Dados consolidados em tempo real.</p>
            </header>

            <!-- É AQUI QUE OS OUTROS ARQUIVOS VÃO ENTRAR -->
            {% block content %}
            {% endblock %}
        </main>
    </div>
</div>

</body>
</html>
