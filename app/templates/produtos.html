<!-- 
    
    Código reutilizado do projeto antigo
    
{% extends 'base.html' %}

{% block content %}

{% if user.is_authenticated %}

<p>Bem-vindo de volta, {{ usuario }}!</p>
<h3>Cursos:</h3>

<ul>
    {% for curso in cursos %}
    <br>
    <li><strong>{{ curso.nome }}</strong> <br> Carga Horária: {{curso.carga_horaria}} horas <br> Nível: {{curso.nivel}}
    </li>

    {% endfor %}
</ul>

<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCurso">
    Criar novo Curso
</button>

<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalAvaliacao">
    Fazer Avaliação do Curso
</button>
{% else %}

<p>Por favor, faça login.</p>

{% endif %}

<div class="modal fade" id="modalCurso" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="cursoModalLabel">Novo curso</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <hr>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </form>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalAvaliacao" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">Deixe sua Avaliação</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <form method="POST">

                    {% csrf_token %}
                    {{ form_avaliacao.as_p }}

                    <hr>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </form>
                </form>
            </div>
        </div>
    </div>

    {% endblock %} -->
